version: 2

models:
  - name: fct_orders
    description: Order fact table with line-item grain
    columns:
      - name: order_item_id
        description: Unique order line item ID
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: product_id
        tests:
          - relationships:
              to: ref('dim_products')
              field: product_id
      - name: total_price
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      
  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - unique
          - not_null