ecommerce_analytics:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      private_key_path: /tmp/snowflake_key.p8
      role: ACCOUNTADMIN
      database: ECOMMERCE_DB
      warehouse: DEV_WH
      schema: STAGING
      threads: 4