# This file DEPLOYS to production when code is merged
name: Deploy to Production

# WHEN to run: When code is merged to main branch
on:
  push:
    branches:
      - main

# WHAT to do:
jobs:
  deploy-to-staging:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dbt
        run: pip install dbt-snowflake==1.11.4
      
      - name: Setup Snowflake private key
        run: |
          cat << 'EOF' > /tmp/snowflake_key.p8
          ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          EOF
          chmod 600 /tmp/snowflake_key.p8
      
      - name: Deploy to Staging
        run: |
          dbt deps --profiles-dir .github         
          dbt run --profiles-dir .github --target dev
          dbt test --profiles-dir .github --target dev
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }} 
      
      - name: Notify on Slack
        if: success()
        run: |
          echo "Deployment successful! In production, this would send Slack notification"